services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend-dist:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_PATH: /data/oda-knit.db
      ADMIN_USERNAME: odaknits
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CONTACT_EMAIL_TO: ${CONTACT_EMAIL_TO:-oda.hennissen@gmail.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_POST_LIMIT: ${INSTAGRAM_POST_LIMIT:-8}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      VIPPS_CLIENT_ID: ${VIPPS_CLIENT_ID:-}
      VIPPS_CLIENT_SECRET: ${VIPPS_CLIENT_SECRET:-}
      VIPPS_SUBSCRIPTION_KEY: ${VIPPS_SUBSCRIPTION_KEY:-}
      VIPPS_MSN: ${VIPPS_MSN:-}
      VIPPS_BASE_URL: ${VIPPS_BASE_URL:-https://api.vipps.no}
    volumes:
      - oda-knit-data:/data

  # One-shot: builds the static frontend bundle, copies it into the
  # frontend-dist volume, then exits. Caddy serves the built files directly
  # (see Caddyfile) instead of proxying to a running `vite preview` server.
  # The volume is mounted at /srv-out (not /app/dist) and copied explicitly:
  # Docker only auto-populates a named volume from image content the first
  # time it's created, so mounting straight over /app/dist would silently
  # keep serving the very first deploy's build on every run after that.
  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: build
      args:
        VITE_API_URL: ""
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    command: ["sh", "-c", "rm -rf /srv-out/* && cp -a /app/dist/. /srv-out/"]
    volumes:
      - frontend-dist:/srv-out

volumes:
  oda-knit-data:
  caddy-data:
  caddy-config:
  frontend-dist:
