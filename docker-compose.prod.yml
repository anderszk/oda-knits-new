x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: odaknits
      POSTGRES_USER: odaknits
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odaknits"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend-dist:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://odaknits:${POSTGRES_PASSWORD}@postgres:5432/odaknits
      UPLOAD_DIR: /data
      ADMIN_USERNAME: odaknits
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      CONTACT_EMAIL_TO: ${CONTACT_EMAIL_TO:-oda.hennissen@gmail.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_POST_LIMIT: ${INSTAGRAM_POST_LIMIT:-8}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      VIPPS_CLIENT_ID: ${VIPPS_CLIENT_ID:-}
      VIPPS_CLIENT_SECRET: ${VIPPS_CLIENT_SECRET:-}
      VIPPS_SUBSCRIPTION_KEY: ${VIPPS_SUBSCRIPTION_KEY:-}
      VIPPS_MSN: ${VIPPS_MSN:-}
      VIPPS_BASE_URL: ${VIPPS_BASE_URL:-https://api.vipps.no}
    volumes:
      - oda-knit-data:/data

  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: build
      args:
        VITE_API_URL: ""
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    logging: *default-logging
    user: root
    command: ["sh", "-c", "rm -rf /srv-out/* && cp -a /app/dist/. /srv-out/"]
    volumes:
      - frontend-dist:/srv-out

volumes:
  oda-knit-data:
  postgres-data:
  caddy-data:
  caddy-config:
  frontend-dist:
