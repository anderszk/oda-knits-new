name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SERVER: ${{ secrets.DEPLOY_SERVER || 'root@206.189.239.37' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${SERVER#*@}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SERVER: ${{ secrets.DEPLOY_SERVER || 'root@206.189.239.37' }}
          APP_DIR: ${{ secrets.DEPLOY_APP_DIR || '/opt/oda-knits' }}
        run: ./deploy_application.sh
