services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: odaknits
      POSTGRES_USER: odaknits
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odaknits"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips="*"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://odaknits:devpassword@postgres:5432/odaknits
      ADMIN_USERNAME: odaknits
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_COOKIE_SECURE: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      CONTACT_EMAIL_TO: ${CONTACT_EMAIL_TO:-oda.hennissen@gmail.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_POST_LIMIT: ${INSTAGRAM_POST_LIMIT:-8}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      VIPPS_CLIENT_ID: ${VIPPS_CLIENT_ID:-}
      VIPPS_CLIENT_SECRET: ${VIPPS_CLIENT_SECRET:-}
      VIPPS_SUBSCRIPTION_KEY: ${VIPPS_SUBSCRIPTION_KEY:-}
      VIPPS_MSN: ${VIPPS_MSN:-}
      VIPPS_BASE_URL: ${VIPPS_BASE_URL:-https://apitest.vipps.no}
    expose:
      - "8000"
    volumes:
      - ./backend:/app/backend
      - ./database:/app/database

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      BACKEND_PROXY_TARGET: "http://backend:8000"
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "8000:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
    depends_on:
      - backend

volumes:
  postgres-data:
